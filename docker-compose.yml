services:
  gitfiledock:
    build: .
    container_name: gitfiledock
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - gfd-data:/app/data
      - gfd-repos:/app/data/repos
    environment:
      - DATABASE_URL=file:./data/gitfiledock.db
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-a-random-key}
      - GIT_USER_NAME=${GIT_USER_NAME:-GitFileDock}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-gitfiledock@local}
    restart: unless-stopped

volumes:
  gfd-data:
  gfd-repos:
